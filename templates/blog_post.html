<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{POST_TITLE}} | 데이터머니</title>
<meta name="description" content="{{POST_EXCERPT}}">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; color: #1e293b; line-height: 1.8; margin: 0; }
  .dm-post { max-width: 760px; margin: 0 auto; padding: 32px 16px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  h2 { font-size: 22px; font-weight: 700; margin-top: 40px; border-left: 4px solid #2563EB; padding-left: 12px; }
  h3 { font-size: 18px; font-weight: 600; margin-top: 28px; }
  p  { margin: 16px 0; }
  table { width: 100%; border-collapse: collapse; margin: 24px 0; }
  th, td { border: 1px solid #e2e8f0; padding: 10px 14px; text-align: left; }
  th { background: #0F172A; color: #F8FAFC; }
  tr:nth-child(even) { background: #f8fafc; }
  .dm-affiliate-box { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 8px; padding: 20px; margin: 32px 0; }
  .dm-affiliate-box h3 { margin-top: 0; color: #1e40af; }
  .dm-affiliate-box ul { margin: 8px 0; padding-left: 20px; }
  .dm-affiliate-box a { color: #2563EB; font-weight: 600; }
  .dm-yt-link { display: inline-block; background: #DC2626; color: #fff; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-weight: 600; margin: 16px 0; }
  blockquote { border-left: 4px solid #FACC15; margin: 24px 0; padding: 12px 20px; background: #fefce8; color: #713f12; }
</style>
<!-- AdSense 스크립트 — publisher_id 설정 후 활성화 -->

<link rel="stylesheet" href="/global.css">
</head>
<body>
<article class="dm-post">
  {{POST_CONTENT}}
</article>
</body>
</html>
