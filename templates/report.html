<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @page {
    size: A4;
    margin: 20mm 18mm 20mm 18mm;
    @bottom-right { content: "Page " counter(page) " / " counter(pages); font-size: 10px; color: #64748B; }
  }
  * { box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    font-size: 11pt;
    color: #1e293b;
    line-height: 1.7;
    margin: 0;
  }

  /* 커버 페이지 */
  .cover {
    page-break-after: always;
    background: #0F172A;
    color: #F8FAFC;
    height: 257mm;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40mm 20mm;
  }
  .cover .brand { font-size: 13pt; color: #64748B; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
  .cover h1 { font-size: 28pt; font-weight: 700; margin: 0 0 12px; line-height: 1.3; }
  .cover .week { font-size: 14pt; color: #2563EB; margin: 0 0 40px; }
  .cover .tagline { font-size: 11pt; color: #94A3B8; border-top: 1px solid #334155; padding-top: 20px; }

  /* 본문 */
  h2 { font-size: 15pt; font-weight: 700; color: #0F172A; border-bottom: 2px solid #2563EB; padding-bottom: 6px; margin-top: 28px; }
  h3 { font-size: 12pt; font-weight: 600; color: #1e40af; margin-top: 20px; }

  .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
  .metric-card { background: #F8FAFC; border: 1px solid #e2e8f0; border-radius: 6px; padding: 14px; text-align: center; }
  .metric-card .label { font-size: 9pt; color: #64748B; margin-bottom: 4px; }
  .metric-card .value { font-size: 18pt; font-weight: 700; color: #0F172A; }
  .metric-card .change { font-size: 9pt; margin-top: 4px; }
  .metric-card .change.up   { color: #16A34A; }
  .metric-card .change.down { color: #DC2626; }

  .trend-item { background: #F8FAFC; border-left: 4px solid #2563EB; padding: 12px 16px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .trend-item h4 { margin: 0 0 6px; font-size: 11pt; font-weight: 600; }
  .trend-item p  { margin: 0; font-size: 10pt; color: #475569; }

  .next-issue { background: #FEF3C7; border-left: 4px solid #FACC15; padding: 12px 16px; margin: 12px 0; border-radius: 0 6px 6px 0; }
  .next-issue h4 { margin: 0 0 6px; font-size: 11pt; font-weight: 600; color: #78350F; }
  .next-issue p  { margin: 0; font-size: 10pt; color: #92400E; }

  table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 10pt; }
  th { background: #0F172A; color: #F8FAFC; padding: 8px 12px; text-align: center; }
  td { border: 1px solid #e2e8f0; padding: 8px 12px; text-align: center; }
  tr:nth-child(even) td { background: #F8FAFC; }

  .footer-note { margin-top: 40px; padding-top: 12px; border-top: 1px solid #e2e8f0; font-size: 9pt; color: #94A3B8; }

  /* 추가 본문 */
  {{REPORT_CONTENT}}
</style>
<link rel="stylesheet" href="/global.css">
</head>
<body>

<!-- 커버 -->
<div class="cover">
  <div class="brand">데이터머니 · DataMoney</div>
  <h1>{{REPORT_TITLE}}</h1>
  <div class="week">{{WEEK_LABEL}}</div>
  <div class="tagline">
    데이터로 읽는 금융 시장 · 매주 월요일 발행<br>
    datamoney.kr
  </div>
</div>

<!-- 본문 — Claude가 생성한 HTML로 교체됨 -->
{{REPORT_CONTENT}}

<div class="footer-note">
  본 리포트는 투자 권유가 아니며, 정보 제공 목적으로만 제작되었습니다.<br>
  © 2026 데이터머니 | datamoney.kr
</div>

</body>
</html>
